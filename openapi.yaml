openapi: "3.0.3"
info:
  version: 1.0.0
  title: Transfers Service REST API

paths:
  /livez:
    get:
      operationId: Livez
      description: liveness check - checks if process is deadlocked
      responses:
        "200":
          description: process is running fine
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: string
              example:
                data: "ok"

  /readyz:
    get:
      operationId: Readyz
      description: readiness check - checks if process can handle traffic (also considers downstream dependencies)
      responses:
        "200":
          description: process is ready to handle traffic
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: string
              example:
                data: "ok"
        "500":
          description: process is not ready (downstream dependency unavailable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/laughing-goggles/errors/database-unavailable"
                title: "Service Unavailable"
                status: 500
                detail: "database is not reachable"

  /accounts:
    post:
      operationId: CreateAccount
      description: create account with an initial balance
      tags:
        - accounts
      requestBody:
        description: account ID and initial balance to create the account with
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
            example:
              account_id: 123
              initial_balance: "100.23344"
      responses:
        "201":
          description: account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
              example:
                account_id: 123
                balance: "100.23344"
        "400":
          description: bad request - invalid or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                negative_initial_balance:
                  summary: negative initial balance
                  value:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/negative-initial-balance"
                    title: "Bad Request"
                    status: 400
                    detail: "initial_balance must be a positive numeric string (e.g. \"10.00\")"
                invalid_initial_balance:
                  summary: non-numeric initial balance
                  value:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/invalid-initial-balance"
                    title: "Bad Request"
                    status: 400
                    detail: "initial_balance must be a numeric string (e.g. \"10.00\"), got \"abc\""
        "409":
          description: conflict - account already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/laughing-goggles/errors/account-already-exists"
                title: "Conflict"
                status: 409
                detail: "account with id \"123\" already exists"
                instance: "/accounts/123"
        "500":
          description: internal server error - failed to create account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/laughing-goggles/errors/internal-server-error"
                title: "Internal Server Error"
                status: 500
                detail: "failed to create account"
                instance: "/accounts"

  /accounts/{account_id}:
    get:
      operationId: GetAccountByID
      description: returns the account and its balance
      tags:
        - accounts
      parameters:
        - name: account_id
          description: id of account you're attempting to fetch
          in: path 
          required: true
          schema:
            type: integer
            x-go-type: int64
      responses:
        "200":
          description: successfully retrieved account and its balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
              example:
                account_id: 123
                balance: "100.23344"
        "404":
          description: account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                account_not_found:
                  summary: account not found
                  value:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/account-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "no account with id \"123\""
        "500":
          description: internal server error - failed to get account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/laughing-goggles/errors/internal-server-error"
                title: "Internal Server Error"
                status: 500
                detail: "failed to get account"
                instance: "/accounts"

  /transactions:
    post:
      operationId: CreateTransaction
      description: transfer money from source to destination account
      tags:
        - accounts
      requestBody:
        description: transaction details
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
            example:
              source_account_id: 123
              amount: "100.12345"
              destination_account_id: 456
      responses:
        "200":
          description: account created successfully
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: string
              example:
                data: "ok"
        "400":
          description: bad request - invalid or missing fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                negative_amount:
                  summary: negative amount
                  value:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/negative-amount"
                    title: "Bad Request"
                    status: 400
                    detail: "amount must be a positive numeric string (e.g. \"10.00\")"
                invalid_amount:
                  summary: non-numeric amount
                  value:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/invalid-amount"
                    title: "Bad Request"
                    status: 400
                    detail: "amount must be a numeric string (e.g. \"10.00\"), got \"abc\""
        "404":
          description: account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                    type: "https://github.com/JoelLau/laughing-goggles/errors/account-not-found"
                    title: "Not Found"
                    status: 404
                    detail: "no account with id \"123\""
        "500":
          description: internal server error - failed to create transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                type: "https://github.com/JoelLau/laughing-goggles/errors/internal-server-error"
                title: "Internal Server Error"
                status: 500
                detail: "failed to create transaction"
                instance: "/transactions"

components:
  schemas:
    CreateAccountRequest:
      type: object
      required:
        - account_id
        - initial_balance
      properties:
        account_id:
          type: integer
          x-go-type: int64
          description: account unique identifier
          example: 123
        initial_balance:
          type: string
          description: account opening balance
          example: "100.23344"

    CreateTransactionRequest:
      type: object
      required:
        - source_account_id
        - amount
        - destination_account_id
      properties:
        source_account_id:
          type: integer
          x-go-type: int64
          description: account funds will be deducted from
          example: 123
        amount:
          type: string
          description: amount to transafer
          example: "100.12345"
        destination_account_id:
          type: integer
          x-go-type: int64
          description: account funds will be transferred to
          example: 456

    AccountResponse:
      type: object
      required:
        - account_id
        - balance
      properties:
        account_id:
          type: integer
          x-go-type: int64
          description: account unique identifier
          example: 123
        balance:
          type: string
          description: account balance
          example: "100.23344"

    ErrorResponse: # loosely based on RFC9457
      type: object
      required:
        - type
        - title
        - status
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
        title:
          type: string
          description: A short, human-readable summary of the problem.
        status:
          type: integer
          description: The HTTP status code generated for this occurrence.
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri
          description: A URI reference to the resource involved in this error (e.g. "/accounts/123").
